@if (isShown()) {
  <div
    class="vw-1920 vh-316 mt-53.5 flex flex-row bg-[#171C22B3]"
    animate.enter="animate-scoreboard-in animate-duration-180"
    animate.leave="animate-scoreboard-out animate-duration-180"
  >
    <div class="absolute top-[22vh] left-[58vh] opacity-35">
      <img
        [src]="dataModel.teams()[0].teamUrl"
        class="h-[25vh] max-h-[25vh] w-[25vh] max-w-[25vh] object-contain"
      />
    </div>
    <div class="absolute top-[22vh] left-[94vh] opacity-35">
      <img
        [src]="dataModel.teams()[1].teamUrl"
        class="h-[25vh] max-h-[25vh] w-[25vh] max-w-[25vh] object-contain"
      />
    </div>
    <!-- Score blocks -->
    @for (team of sortedTeams(); track $index; let teamIndex = $index) {
      <div
        class="flex translate-x-1 transform flex-col gap-1 rounded-sm py-4"
        [class]="teamIndex === 0 ? 'mr-2.5 ml-3' : 'mr-3 ml-2.5'"
        style="gap: 4px"
      >
        @for (player of team.players; track $index) {
          @if (!dataModel.minimalMode()) {
            <app-playerscore-new
              [player]="player"
              [right]="teamIndex === 1"
              [color]="team.isAttacking ? 'attacker' : 'defender'"
            ></app-playerscore-new>
          } @else {
            <app-playerscore-minimal-new
              [player]="player"
              [right]="teamIndex === 1"
              [color]="team.isAttacking ? 'attacker' : 'defender'"
            ></app-playerscore-minimal-new>
          }
        }
      </div>
    }
  </div>
}
