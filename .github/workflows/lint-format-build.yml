name: Lint, Format and Build

on:
  push:
    branches: [master, eu-release, release]
  pull_request:
    branches: [master, eu-release, release]

jobs:
  lint-format-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run eslint
        run: yarn run lint

      - name: Run prettier
        run: yarn run format

      - name: Run build
        run: yarn build
